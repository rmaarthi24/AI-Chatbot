<!DOCTYPE html>
<html>
<head>
<title>Simple AI Chatbot</title>

<style>

body{
font-family: Arial;
background:#e6f2ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:350px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

#chatbox{
height:300px;
border:1px solid #ccc;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
}

.user{
color:blue;
}

.bot{
color:green;
}

input{
width:70%;
padding:8px;
}

button{
padding:8px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>
</head>

<body>

<div class="chat-container">

<h2>AI Chatbot</h2>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput");
let message = input.value.toLowerCase();

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += "<p class='user'><b>You:</b> " + message + "</p>";

let reply = "";

if(message.includes("hello") || message.includes("hi")){
reply = "Hello! How can I help you?";
}

else if(message.includes("your name")){
reply = "I am a simple AI chatbot.";
}

else if(message.includes("how are you")){
reply = "I am fine! Thanks for asking.";
}

else if(message.includes("bye")){
reply = "Goodbye! Have a nice day.";
}

else{
reply = "Sorry, I don't understand.";
}

chatbox.innerHTML += "<p class='bot'><b>Bot:</b> " + reply + "</p>";

input.value="";

chatbox.scrollTop = chatbox.scrollHeight;

}

</script>

</body>
</html>
